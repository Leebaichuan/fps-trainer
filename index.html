<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FPS Aim Trainer - 练枪训练平台</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- 主菜单 -->
  <div id="main-menu">
    <header class="menu-header">
      <div class="logo-mark">
        <div class="logo-cross"></div>
      </div>
      <h1>Aim<span class="accent">Trainer</span></h1>
      <p class="subtitle">Tactical Training Platform</p>
      <div class="header-line"></div>
    </header>

    <nav class="module-grid" id="module-grid">
      <!-- 由 app.js 动态生成 -->
    </nav>

    <footer class="menu-footer">
      <button class="btn-ghost" id="btn-stats-panel">训练统计</button>
      <span class="version">v1.0</span>
    </footer>
  </div>

  <!-- 训练界面 -->
  <div id="training-view" class="hidden">
    <div id="training-hud" class="training-hud">
      <div class="hud-left">
        <button class="btn-back" id="btn-back" title="返回菜单">✕</button>
        <span class="hud-module-name" id="hud-module-name"></span>
      </div>
      <div class="hud-center" id="hud-stats">
        <!-- 动态填充 -->
      </div>
      <div class="hud-right">
        <div class="hud-sens">
          <button class="hud-sens-btn" id="btn-sens-down" title="降低灵敏度">−</button>
          <span class="hud-sens-val" id="hud-sens-val">0.50</span>
          <button class="hud-sens-btn" id="btn-sens-up" title="提高灵敏度">+</button>
        </div>
        <span class="hud-timer" id="hud-timer">00:00</span>
        <button class="btn-settings" id="btn-settings" title="准星设置">&#9881;</button>
      </div>
    </div>
    <canvas id="training-canvas"></canvas>
  </div>

  <!-- 结果面板 -->
  <div id="result-overlay" class="overlay hidden">
    <div class="result-card">
      <h2 id="result-title">训练结束</h2>
      <div id="result-content"></div>
      <div class="result-actions">
        <button class="btn-primary" id="btn-retry">再来一次</button>
        <button class="btn-secondary" id="btn-menu">返回菜单</button>
      </div>
    </div>
  </div>

  <!-- 设置面板 -->
  <div id="settings-overlay" class="overlay hidden">
    <div class="settings-card">
      <h2>训练设置</h2>
      <div id="settings-content"></div>
      <div class="settings-actions">
        <button class="btn-primary" id="btn-settings-save">保存并开始</button>
        <button class="btn-secondary" id="btn-settings-cancel">取消</button>
      </div>
    </div>
  </div>

  <!-- 准星设置面板 -->
  <div id="crosshair-overlay" class="overlay hidden">
    <div class="crosshair-card">
      <h2>准星设置</h2>
      <div class="ch-section">
        <div class="ch-label">样式</div>
        <div class="ch-preset-row" id="ch-styles"></div>
      </div>
      <div class="ch-section">
        <div class="ch-label">颜色</div>
        <div class="ch-color-row" id="ch-colors"></div>
      </div>
      <div class="ch-section ch-sliders">
        <div class="setting-group">
          <label>大小</label>
          <input type="range" id="ch-size" min="2" max="20" step="1" value="8">
        </div>
        <div class="setting-group">
          <label>间距</label>
          <input type="range" id="ch-gap" min="0" max="12" step="0.5" value="3">
        </div>
        <div class="setting-group">
          <label>粗细</label>
          <input type="range" id="ch-thickness" min="0.5" max="6" step="0.5" value="1.5">
        </div>
        <div class="setting-group">
          <label>不透明度</label>
          <input type="range" id="ch-opacity" min="0.2" max="1" step="0.05" value="0.9">
        </div>
      </div>
      <div class="ch-section">
        <div class="ch-label">灵敏度</div>
        <div class="setting-group">
          <div class="sens-row">
            <input type="range" id="ch-sensitivity" min="0.01" max="3.00" step="0.01" value="0.50">
            <input type="number" class="sens-input" id="ch-sens-input" value="0.50" min="0.01" max="3.00" step="0.01">
          </div>
          <div class="range-labels"><span>0.01</span><span>1.00</span><span>2.00</span><span>3.00</span></div>
        </div>
      </div>
      <div class="ch-toggles">
        <label class="ch-toggle"><input type="checkbox" id="ch-outline" checked> 描边</label>
        <label class="ch-toggle"><input type="checkbox" id="ch-center-dot" checked> 中心点</label>
        <label class="ch-toggle" title="原始鼠标输入，消除系统加速度，推荐开启以获得最佳手感。"><input type="checkbox" id="ch-raw-input" checked> 原始输入</label>
      </div>
      <div class="settings-actions">
        <button class="btn-primary" id="btn-ch-save">应用</button>
        <button class="btn-secondary" id="btn-ch-close">关闭</button>
        <button class="btn-ghost" id="btn-ch-reset">重置</button>
      </div>
    </div>
  </div>

  <!-- 统计面板 -->
  <div id="stats-overlay" class="overlay hidden">
    <div class="stats-card">
      <h2>训练统计</h2>
      <div id="stats-content"></div>
      <div class="stats-actions">
        <button class="btn-secondary" id="btn-stats-close">关闭</button>
        <button class="btn-danger" id="btn-stats-reset">🗑 重置数据</button>
      </div>
    </div>
  </div>

  <script src="js/utils.js"></script>
  <script src="js/stats.js"></script>
  <script src="js/settings.js"></script>
  <script src="js/app.js"></script>
  <script src="js/modules/reaction.js"></script>
  <script src="js/modules/clicking.js"></script>
  <script src="js/modules/tracking.js"></script>
  <script src="js/modules/switching.js"></script>
  <script src="js/modules/precision.js"></script>
  <script src="js/modules/gridshot.js"></script>
</body>
</html>
